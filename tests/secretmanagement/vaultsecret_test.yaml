---
suite: VaultSecret
templates:
  - secretmanagement/vaultsecrets.yaml

tests:
  - it: should not render when vaultSecrets is empty
    set:
      vaultSecrets: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      vaultSecrets:
        disabled-secret: null
        active-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: VaultSecret

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      vaultSecrets:
        db-credentials:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-db-credentials-vaultsecret$"

  - it: should inject shared auth defaults into definitions
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.path
          value: kubernetes
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.role
          value: app-role
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.serviceAccount.name
          value: default

  - it: should allow per-definition auth override
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: default-role
          vaultSecretDefinitions:
            - name: creds
              authentication:
                role: special-role
                path: custom-auth
                serviceAccount:
                  name: my-sa
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.role
          value: special-role
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.path
          value: custom-auth
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.serviceAccount.name
          value: my-sa

  - it: should apply sensible defaults
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.refreshPeriod
          value: "1h"
      - equal:
          path: spec.refreshThreshold
          value: 90
      - equal:
          path: spec.output.type
          value: Opaque
      - isNull:
          path: spec.syncOnResourceChange

  - it: should allow overriding all defaults
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          refreshPeriod: "30m"
          refreshThreshold: 50
          syncOnResourceChange: true
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            type: kubernetes.io/tls
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.refreshPeriod
          value: "30m"
      - equal:
          path: spec.refreshThreshold
          value: 50
      - equal:
          path: spec.syncOnResourceChange
          value: true
      - equal:
          path: spec.output.type
          value: kubernetes.io/tls

  - it: should render syncOnResourceChange when set to false
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          syncOnResourceChange: false
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.syncOnResourceChange
          value: false

  - it: should fail when vaultSecretDefinitions is missing
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          output:
            name: my-secret
            stringData:
              password: value
    asserts:
      - failedTemplate:
          errorMessage: "vaultSecrets.my-secret.vaultSecretDefinitions is required"

  - it: should fail when output.name is missing
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - failedTemplate:
          errorMessage: "vaultSecrets.my-secret.output.name is required"

  - it: should fail when output.stringData is missing
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
    asserts:
      - failedTemplate:
          errorMessage: "vaultSecrets.my-secret.output.stringData is required"

  - it: should render multiple definitions with shared auth
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: dbcreds
              path: secret/data/app/db
            - name: apikey
              path: secret/data/app/api
          output:
            name: my-secret
            stringData:
              DB_PASSWORD: '{{ .dbcreds.data.password }}'
              API_KEY: '{{ .apikey.data.key }}'
    asserts:
      - equal:
          path: spec.vaultSecretDefinitions[0].authentication.role
          value: app-role
      - equal:
          path: spec.vaultSecretDefinitions[1].authentication.role
          value: app-role
      - equal:
          path: spec.vaultSecretDefinitions[0].path
          value: secret/data/app/db
      - equal:
          path: spec.vaultSecretDefinitions[1].path
          value: secret/data/app/api

  - it: should render multiple resources
    set:
      vaultSecrets:
        first-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: first-k8s-secret
            stringData:
              password: '{{ .creds.password }}'
        second-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: api
              path: secret/data/app/api
          output:
            name: second-k8s-secret
            stringData:
              token: '{{ .api.token }}'
    asserts:
      - hasDocuments:
          count: 2

  - it: should render connection from shared config
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          connection:
            address: "http://openbao.openbao.svc:8200"
            maxRetries: 3
            timeOut: "30s"
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.vaultSecretDefinitions[0].connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.vaultSecretDefinitions[0].connection.maxRetries
          value: 3

  - it: should render requestType and requestPayload when set
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
              requestType: POST
              requestPayload:
                version: "2"
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - equal:
          path: spec.vaultSecretDefinitions[0].requestType
          value: POST
      - equal:
          path: spec.vaultSecretDefinitions[0].requestPayload.version
          value: "2"

  - it: should render output labels and annotations
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
            labels:
              app: my-app
            annotations:
              reloader.stakater.com/match: "true"
    asserts:
      - equal:
          path: spec.output.labels.app
          value: my-app
      - equal:
          path: spec.output.annotations["reloader.stakater.com/match"]
          value: "true"

  - it: should include common labels
    set:
      vaultSecrets:
        my-secret:
          authentication:
            role: app-role
          vaultSecretDefinitions:
            - name: creds
              path: secret/data/app/db
          output:
            name: my-secret
            stringData:
              password: '{{ .creds.password }}'
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
