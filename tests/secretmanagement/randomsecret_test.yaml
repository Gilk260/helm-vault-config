---
suite: RandomSecret
templates:
  - secretmanagement/randomsecrets.yaml

tests:
  - it: should not render when randomSecrets is empty
    set:
      randomSecrets: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      randomSecrets:
        disabled-secret: null
        active-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: RandomSecret

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      randomSecrets:
        db-password:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-db-password-randomsecret$"

  - it: should use dict key as vault name by default
    set:
      randomSecrets:
        my-db-password:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - equal:
          path: spec.name
          value: my-db-password

  - it: should allow overriding vault name
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          name: custom-vault-name
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - equal:
          path: spec.name
          value: custom-vault-name

  - it: should apply sensible defaults
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.isKVSecretsEngineV2
          value: true
      - equal:
          path: spec.kvSecretRetainPolicy
          value: Retain
      - equal:
          path: spec.refreshPeriod
          value: "1h"

  - it: should allow overriding all defaults
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
          path: kv
          secretKey: token
          isKVSecretsEngineV2: false
          kvSecretRetainPolicy: Delete
          refreshPeriod: 24h
          secretFormat:
            passwordPolicyName: strong
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.isKVSecretsEngineV2
          value: false
      - equal:
          path: spec.kvSecretRetainPolicy
          value: Delete
      - equal:
          path: spec.refreshPeriod
          value: "24h"

  - it: should render passwordPolicyName when set
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - equal:
          path: spec.secretFormat.passwordPolicyName
          value: default-password
      - isNull:
          path: spec.secretFormat.inlinePasswordPolicy

  - it: should render inlinePasswordPolicy when set
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            inlinePasswordPolicy: |
              length = 32
              rule "charset" {
                charset = "abc"
              }
    asserts:
      - isNotNull:
          path: spec.secretFormat.inlinePasswordPolicy
      - isNull:
          path: spec.secretFormat.passwordPolicyName

  - it: should fail when authentication.role is missing
    set:
      randomSecrets:
        my-secret:
          authentication: {}
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - failedTemplate:
          errorMessage: "randomSecrets.my-secret.authentication.role is required"

  - it: should fail when path is missing
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - failedTemplate:
          errorMessage: "randomSecrets.my-secret.path is required"

  - it: should fail when secretKey is missing
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - failedTemplate:
          errorMessage: "randomSecrets.my-secret.secretKey is required"

  - it: should fail when both secretFormat fields are set
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
            inlinePasswordPolicy: "length = 32"
    asserts:
      - failedTemplate:
          errorMessage: "randomSecrets.my-secret.secretFormat: specify exactly one of passwordPolicyName or inlinePasswordPolicy"

  - it: should fail when no secretFormat field is set
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat: {}
    asserts:
      - failedTemplate:
          errorMessage: "randomSecrets.my-secret.secretFormat: one of passwordPolicyName or inlinePasswordPolicy is required"

  - it: should render multiple resources
    set:
      randomSecrets:
        first-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
        second-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: token
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - hasDocuments:
          count: 2

  - it: should render connection when specified
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - isNull:
          path: spec.connection

  - it: should include common labels
    set:
      randomSecrets:
        my-secret:
          authentication:
            role: vault-admin
          path: secret
          secretKey: password
          secretFormat:
            passwordPolicyName: default-password
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
