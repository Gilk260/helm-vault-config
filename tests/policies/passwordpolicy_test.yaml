---
suite: PasswordPolicy
templates:
  - policies/passwordpolicies.yaml

tests:
  - it: should not render when passwordPolicies is empty
    set:
      passwordPolicies: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      passwordPolicies:
        disabled-policy: null
        active-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
            rule "charset" {
              charset = "abcdefghijklmnopqrstuvwxyz"
            }
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: PasswordPolicy

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      passwordPolicies:
        strong-password:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-strong-password-passwordpolicy$"

  - it: should use dict key as vault name by default
    set:
      passwordPolicies:
        my-password-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
    asserts:
      - equal:
          path: spec.name
          value: my-password-policy

  - it: should allow overriding vault name
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          name: custom-vault-name
          passwordPolicy: |
            length = 20
    asserts:
      - equal:
          path: spec.name
          value: custom-vault-name

  - it: should apply sensible defaults
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default

  - it: should allow overriding all defaults
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: my-namespace
          passwordPolicy: |
            length = 20
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: my-namespace

  - it: should fail when authentication.role is missing
    set:
      passwordPolicies:
        my-policy:
          authentication: {}
          passwordPolicy: |
            length = 20
    asserts:
      - failedTemplate:
          errorMessage: "passwordPolicies.my-policy.authentication.role is required"

  - it: should fail when passwordPolicy is missing
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "passwordPolicies.my-policy.passwordPolicy is required"

  - it: should render multi-line passwordPolicy correctly
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 32
            rule "charset" {
              charset = "abcdefghijklmnopqrstuvwxyz"
              min-chars = 1
            }
            rule "charset" {
              charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"
              min-chars = 1
            }
            rule "charset" {
              charset = "0123456789"
              min-chars = 1
            }
    asserts:
      - matchRegex:
          path: spec.passwordPolicy
          pattern: "length = 32"
      - matchRegex:
          path: spec.passwordPolicy
          pattern: "charset = \"abcdefghijklmnopqrstuvwxyz\""
      - matchRegex:
          path: spec.passwordPolicy
          pattern: "min-chars = 1"

  - it: should render connection when specified
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          passwordPolicy: |
            length = 20
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      passwordPolicies:
        first-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
        second-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 32
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      passwordPolicies:
        my-policy:
          authentication:
            role: vault-admin
          passwordPolicy: |
            length = 20
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
