---
suite: IdentityTokenConfig
templates:
  - identity/identitytokenconfigs.yaml

tests:
  - it: should not render when identityTokenConfigs is empty
    set:
      identityTokenConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      identityTokenConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: IdentityTokenConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-config-identitytokenconfig$"

  - it: should apply sensible defaults
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default

  - it: should fail when authentication.role is missing
    set:
      identityTokenConfigs:
        my-config:
          authentication: {}
    asserts:
      - failedTemplate:
          errorMessage: "identityTokenConfigs.my-config.authentication.role is required"

  - it: should render issuer when specified
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
          issuer: "https://vault.example.com"
    asserts:
      - equal:
          path: spec.issuer
          value: "https://vault.example.com"

  - it: should not render issuer when not specified
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - isNull:
          path: spec.issuer

  - it: should render connection when specified
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"

  - it: should not render connection when not specified
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      identityTokenConfigs:
        first-config:
          authentication:
            role: vault-admin
        second-config:
          authentication:
            role: vault-admin
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      identityTokenConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
