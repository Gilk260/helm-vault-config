---
suite: Entity
templates:
  - identity/entities.yaml

tests:
  - it: should not render when entities is empty
    set:
      entities: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      entities:
        disabled-entity: null
        active-entity:
          authentication:
            role: vault-admin
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: Entity

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      entities:
        bob:
          authentication:
            role: vault-admin
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-bob-entity$"

  - it: should use dict key as vault name by default
    set:
      entities:
        bob:
          authentication:
            role: vault-admin
    asserts:
      - equal:
          path: spec.name
          value: bob

  - it: should allow overriding vault name
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
          name: custom-entity-name
    asserts:
      - equal:
          path: spec.name
          value: custom-entity-name

  - it: should apply sensible defaults
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.disabled
          value: false

  - it: should allow overriding disabled to true
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
          disabled: true
    asserts:
      - equal:
          path: spec.disabled
          value: true

  - it: should fail when authentication.role is missing
    set:
      entities:
        my-entity:
          authentication: {}
    asserts:
      - failedTemplate:
          errorMessage: "entities.my-entity.authentication.role is required"

  - it: should render policies when specified
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
          policies:
            - admin-policy
            - read-policy
    asserts:
      - equal:
          path: spec.policies
          value:
            - admin-policy
            - read-policy

  - it: should not render policies when not specified
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
    asserts:
      - isNull:
          path: spec.policies

  - it: should render metadata when specified
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
          metadata:
            email: bob@example.com
            team: platform
    asserts:
      - equal:
          path: spec.metadata.email
          value: bob@example.com
      - equal:
          path: spec.metadata.team
          value: platform

  - it: should render connection when specified
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"

  - it: should not render connection when not specified
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      entities:
        first-entity:
          authentication:
            role: vault-admin
        second-entity:
          authentication:
            role: vault-admin
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      entities:
        my-entity:
          authentication:
            role: vault-admin
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
