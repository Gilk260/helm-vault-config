---
suite: AzureAuthEngineConfig
templates:
  - authengines/azureauthengineconfig.yaml

tests:
  - it: should not render when azureAuthEngineConfigs is empty
    set:
      azureAuthEngineConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      azureAuthEngineConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: AzureAuthEngineConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      azureAuthEngineConfigs:
        my-azure:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-azure-azureauthengineconfig$"

  - it: should apply sensible defaults
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.clientID
          value: ""
      - equal:
          path: spec.environment
          value: AzurePublicCloud
      - equal:
          path: spec.maxRetries
          value: 3
      - equal:
          path: spec.maxRetryDelay
          value: 60
      - equal:
          path: spec.retryDelay
          value: 4

  - it: should allow overriding all defaults
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
          clientID: "11111111-1111-1111-1111-111111111111"
          environment: AzureUSGovernmentCloud
          maxRetries: 5
          maxRetryDelay: 120
          retryDelay: 10
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.clientID
          value: "11111111-1111-1111-1111-111111111111"
      - equal:
          path: spec.environment
          value: AzureUSGovernmentCloud
      - equal:
          path: spec.maxRetries
          value: 5
      - equal:
          path: spec.maxRetryDelay
          value: 120
      - equal:
          path: spec.retryDelay
          value: 10

  - it: should render authentication namespace when set
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
            namespace: vault-enterprise
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - equal:
          path: spec.authentication.namespace
          value: vault-enterprise

  - it: should not render authentication namespace when not set
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - isNull:
          path: spec.authentication.namespace

  - it: should fail when authentication.role is missing
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication: {}
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - failedTemplate:
          errorMessage: "azureAuthEngineConfigs.my-config.authentication.role is required"

  - it: should fail when path is missing
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - failedTemplate:
          errorMessage: "azureAuthEngineConfigs.my-config.path is required"

  - it: should fail when resource is missing
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - failedTemplate:
          errorMessage: "azureAuthEngineConfigs.my-config.resource is required"

  - it: should fail when tenantID is missing
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
    asserts:
      - failedTemplate:
          errorMessage: "azureAuthEngineConfigs.my-config.tenantID is required"

  - it: should render connection when specified
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - isNull:
          path: spec.connection

  - it: should render connection with tLSConfig
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          connection:
            address: "https://vault.example.com:8200"
            tLSConfig:
              cacert: /etc/ssl/certs/ca.pem
              skipVerify: false
              tlsServerName: vault.example.com
              tlsSecret:
                name: vault-tls
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - equal:
          path: spec.connection.tLSConfig.cacert
          value: /etc/ssl/certs/ca.pem
      - equal:
          path: spec.connection.tLSConfig.skipVerify
          value: false
      - equal:
          path: spec.connection.tLSConfig.tlsServerName
          value: vault.example.com
      - equal:
          path: spec.connection.tLSConfig.tlsSecret.name
          value: vault-tls

  - it: should render azureCredentials with secret
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
          azureCredentials:
            secret:
              name: azure-creds
    asserts:
      - equal:
          path: spec.azureCredentials.secret.name
          value: azure-creds
      - equal:
          path: spec.azureCredentials.usernameKey
          value: username
      - equal:
          path: spec.azureCredentials.passwordKey
          value: password

  - it: should render azureCredentials with vaultSecret
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
          azureCredentials:
            vaultSecret:
              path: secret/data/azure-creds
    asserts:
      - equal:
          path: spec.azureCredentials.vaultSecret.path
          value: secret/data/azure-creds

  - it: should render azureCredentials with randomSecret
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
          azureCredentials:
            randomSecret:
              name: azure-random-creds
    asserts:
      - equal:
          path: spec.azureCredentials.randomSecret.name
          value: azure-random-creds

  - it: should allow custom usernameKey and passwordKey
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
          azureCredentials:
            secret:
              name: azure-creds
            usernameKey: client_id
            passwordKey: client_secret
    asserts:
      - equal:
          path: spec.azureCredentials.usernameKey
          value: client_id
      - equal:
          path: spec.azureCredentials.passwordKey
          value: client_secret

  - it: should not render azureCredentials when not specified
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - isNull:
          path: spec.azureCredentials

  - it: should render multiple resources
    set:
      azureAuthEngineConfigs:
        first-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
        second-config:
          authentication:
            role: vault-admin
          path: azure-2
          resource: "https://management.azure.com/"
          tenantID: "11111111-1111-1111-1111-111111111111"
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      azureAuthEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: azure
          resource: "https://management.azure.com/"
          tenantID: "00000000-0000-0000-0000-000000000000"
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
