---
suite: QuaySecretEngineConfig
templates:
  - secretengines/quaysecretengineconfig.yaml

tests:
  - it: should not render when quaySecretEngineConfigs is empty
    set:
      quaySecretEngineConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      quaySecretEngineConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: QuaySecretEngineConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      quaySecretEngineConfigs:
        my-quay:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-quay-quaysecretengineconfig$"

  - it: should apply sensible defaults
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.disableSslVerification
          value: false

  - it: should allow overriding all defaults
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          path: quay
          disableSslVerification: true
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns
      - equal:
          path: spec.disableSslVerification
          value: true

  - it: should fail when authentication.role is missing
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication: {}
          path: quay
    asserts:
      - failedTemplate:
          errorMessage: "quaySecretEngineConfigs.my-config.authentication.role is required"

  - it: should fail when path is missing
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "quaySecretEngineConfigs.my-config.path is required"

  - it: should render connection when specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.connection

  - it: should render url when specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
          url: "https://quay.example.com"
    asserts:
      - equal:
          path: spec.url
          value: "https://quay.example.com"

  - it: should not render url when not specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.url

  - it: should render caCertificate when specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
          caCertificate: "-----BEGIN CERTIFICATE-----\nMIIC...\n-----END CERTIFICATE-----"
    asserts:
      - isNotNull:
          path: spec.caCertificate

  - it: should not render caCertificate when not specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.caCertificate

  - it: should render rootCredentials with secret reference
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
          rootCredentials:
            secret:
              name: quay-creds
            usernameKey: user
            passwordKey: pass
    asserts:
      - equal:
          path: spec.rootCredentials.secret.name
          value: quay-creds
      - equal:
          path: spec.rootCredentials.usernameKey
          value: user
      - equal:
          path: spec.rootCredentials.passwordKey
          value: pass

  - it: should render rootCredentials with vaultSecret reference
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
          rootCredentials:
            vaultSecret:
              path: secret/data/quay
    asserts:
      - equal:
          path: spec.rootCredentials.vaultSecret.path
          value: secret/data/quay

  - it: should render rootCredentials with randomSecret reference
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
          rootCredentials:
            randomSecret:
              name: quay-random
    asserts:
      - equal:
          path: spec.rootCredentials.randomSecret.name
          value: quay-random

  - it: should not render rootCredentials when not specified
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.rootCredentials

  - it: should render multiple resources
    set:
      quaySecretEngineConfigs:
        first-config:
          authentication:
            role: vault-admin
          path: quay
        second-config:
          authentication:
            role: vault-admin
          path: quay-prod
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      quaySecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
