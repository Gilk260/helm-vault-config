---
suite: RabbitMQSecretEngineConfig
templates:
  - secretengines/rabbitmqsecretengineconfig.yaml

tests:
  - it: should not render when rabbitmqSecretEngineConfigs is empty
    set:
      rabbitmqSecretEngineConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      rabbitmqSecretEngineConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: RabbitMQSecretEngineConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-rabbitmq-rabbitmqsecretengineconfig$"

  - it: should include common labels
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should apply authentication defaults
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default

  - it: should allow overriding authentication defaults
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-enterprise
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-enterprise

  - it: should not render authentication.namespace when not set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.authentication.namespace

  - it: should render connectionURI
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "https://rabbitmq.prod.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - equal:
          path: spec.connectionURI
          value: "https://rabbitmq.prod.svc:15672"

  - it: should render rootCredentials with secret
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - equal:
          path: spec.rootCredentials.secret.name
          value: rabbitmq-creds
      - isNull:
          path: spec.rootCredentials.vaultSecret
      - isNull:
          path: spec.rootCredentials.randomSecret

  - it: should render rootCredentials with vaultSecret
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            vaultSecret:
              path: secret/data/rabbitmq
    asserts:
      - equal:
          path: spec.rootCredentials.vaultSecret.path
          value: secret/data/rabbitmq
      - isNull:
          path: spec.rootCredentials.secret
      - isNull:
          path: spec.rootCredentials.randomSecret

  - it: should render rootCredentials with randomSecret
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            randomSecret:
              name: rabbitmq-random
    asserts:
      - equal:
          path: spec.rootCredentials.randomSecret.name
          value: rabbitmq-random
      - isNull:
          path: spec.rootCredentials.secret
      - isNull:
          path: spec.rootCredentials.vaultSecret

  - it: should render rootCredentials custom keys
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
            usernameKey: user
            passwordKey: pass
    asserts:
      - equal:
          path: spec.rootCredentials.usernameKey
          value: user
      - equal:
          path: spec.rootCredentials.passwordKey
          value: pass

  - it: should not render rootCredentials keys when not set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.rootCredentials.usernameKey
      - isNull:
          path: spec.rootCredentials.passwordKey

  - it: should render optional lease TTL fields
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
          leaseTTL: 3600
          leaseMaxTTL: 86400
    asserts:
      - equal:
          path: spec.leaseTTL
          value: 3600
      - equal:
          path: spec.leaseMaxTTL
          value: 86400

  - it: should not render lease TTL fields when not set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.leaseTTL
      - isNull:
          path: spec.leaseMaxTTL

  - it: should render passwordPolicy when set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
          passwordPolicy: strong-password
    asserts:
      - equal:
          path: spec.passwordPolicy
          value: strong-password

  - it: should not render passwordPolicy when not set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.passwordPolicy

  - it: should render username when set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
          username: admin
    asserts:
      - equal:
          path: spec.username
          value: admin

  - it: should render usernameTemplate when set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
          usernameTemplate: "v-{{.RoleName}}-{{unix_time}}"
    asserts:
      - equal:
          path: spec.usernameTemplate
          value: "v-{{.RoleName}}-{{unix_time}}"

  - it: should not render username fields when not set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.username
      - isNull:
          path: spec.usernameTemplate

  - it: should render verifyConnection when explicitly true
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
          verifyConnection: true
    asserts:
      - equal:
          path: spec.verifyConnection
          value: true

  - it: should render verifyConnection when explicitly false
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
          verifyConnection: false
    asserts:
      - equal:
          path: spec.verifyConnection
          value: false

  - it: should not render verifyConnection when not set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.verifyConnection

  - it: should render connection when specified
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - isNull:
          path: spec.connection

  - it: should fail when authentication.role is missing
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication: {}
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmqSecretEngineConfigs.my-rabbitmq.authentication.role is required"

  - it: should fail when connectionURI is missing
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          path: rabbitmq
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmqSecretEngineConfigs.my-rabbitmq.connectionURI is required"

  - it: should fail when path is missing
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          rootCredentials:
            secret:
              name: rabbitmq-creds
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmqSecretEngineConfigs.my-rabbitmq.path is required"

  - it: should fail when no rootCredentials source is set
    set:
      rabbitmqSecretEngineConfigs:
        my-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq.default.svc:15672"
          path: rabbitmq
          rootCredentials: {}
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmqSecretEngineConfigs.my-rabbitmq.rootCredentials: one of secret, vaultSecret, or randomSecret is required"

  - it: should render multiple resources
    set:
      rabbitmqSecretEngineConfigs:
        first-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq-1.default.svc:15672"
          path: rabbitmq/first
          rootCredentials:
            secret:
              name: rabbitmq-creds-1
        second-rabbitmq:
          authentication:
            role: vault-admin
          connectionURI: "http://rabbitmq-2.default.svc:15672"
          path: rabbitmq/second
          rootCredentials:
            vaultSecret:
              path: secret/data/rabbitmq-2
    asserts:
      - hasDocuments:
          count: 2

  - it: should render all optional fields together
    set:
      rabbitmqSecretEngineConfigs:
        full-config:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 5
          connectionURI: "https://rabbitmq.prod.svc:15672"
          path: rabbitmq/prod
          rootCredentials:
            secret:
              name: rabbitmq-creds
            usernameKey: rmq-user
            passwordKey: rmq-pass
          leaseTTL: 1800
          leaseMaxTTL: 7200
          passwordPolicy: strong
          username: admin
          usernameTemplate: "v-{{.RoleName}}"
          verifyConnection: false
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.namespace
          value: vault-ns
      - equal:
          path: spec.connectionURI
          value: "https://rabbitmq.prod.svc:15672"
      - equal:
          path: spec.path
          value: rabbitmq/prod
      - equal:
          path: spec.rootCredentials.secret.name
          value: rabbitmq-creds
      - equal:
          path: spec.rootCredentials.usernameKey
          value: rmq-user
      - equal:
          path: spec.rootCredentials.passwordKey
          value: rmq-pass
      - equal:
          path: spec.leaseTTL
          value: 1800
      - equal:
          path: spec.leaseMaxTTL
          value: 7200
      - equal:
          path: spec.passwordPolicy
          value: strong
      - equal:
          path: spec.username
          value: admin
      - equal:
          path: spec.usernameTemplate
          value: "v-{{.RoleName}}"
      - equal:
          path: spec.verifyConnection
          value: false
