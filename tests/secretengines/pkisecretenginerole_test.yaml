---
suite: PKISecretEngineRole
templates:
  - secretengines/pkisecretenginerole.yaml

tests:
  - it: should not render when pkiSecretEngineRoles is empty
    set:
      pkiSecretEngineRoles: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      pkiSecretEngineRoles:
        disabled-role: null
        active-role:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: PKISecretEngineRole

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      pkiSecretEngineRoles:
        web-certs:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-web-certs-pkisecretenginerole$"

  - it: should include common labels
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should apply sensible defaults
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.TTL
          value: "0s"
      - equal:
          path: spec.maxTTL
          value: "0s"
      - equal:
          path: spec.keyType
          value: rsa
      - equal:
          path: spec.keyBits
          value: 2048

  - it: should allow overriding all defaults
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: admin
          path: pki
          TTL: "720h"
          maxTTL: "8760h"
          keyType: ec
          keyBits: 256
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: admin
      - equal:
          path: spec.TTL
          value: "720h"
      - equal:
          path: spec.maxTTL
          value: "8760h"
      - equal:
          path: spec.keyType
          value: ec
      - equal:
          path: spec.keyBits
          value: 256

  - it: should fail when authentication.role is missing
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication: {}
          path: pki
    asserts:
      - failedTemplate:
          errorMessage: "pkiSecretEngineRoles.my-role.authentication.role is required"

  - it: should fail when path is missing
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "pkiSecretEngineRoles.my-role.path is required"

  - it: should render domain fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          allowedDomains:
            - "example.com"
            - "example.org"
          allowedDomainsTemplate: true
          allowBareDomains: true
          allowSubdomains: true
          allowGlobDomains: true
          allowAnyName: true
          allowLocalhost: true
    asserts:
      - equal:
          path: spec.allowedDomains
          value:
            - "example.com"
            - "example.org"
      - equal:
          path: spec.allowedDomainsTemplate
          value: true
      - equal:
          path: spec.allowBareDomains
          value: true
      - equal:
          path: spec.allowSubdomains
          value: true
      - equal:
          path: spec.allowGlobDomains
          value: true
      - equal:
          path: spec.allowAnyName
          value: true
      - equal:
          path: spec.allowLocalhost
          value: true

  - it: should not render optional fields when not specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - isNull:
          path: spec.allowedDomains
      - isNull:
          path: spec.allowedDomainsTemplate
      - isNull:
          path: spec.allowBareDomains
      - isNull:
          path: spec.allowSubdomains
      - isNull:
          path: spec.allowGlobDomains
      - isNull:
          path: spec.allowAnyName
      - isNull:
          path: spec.allowIPSans
      - isNull:
          path: spec.allowLocalhost
      - isNull:
          path: spec.allowedURISans
      - isNull:
          path: spec.allowedOtherSans
      - isNull:
          path: spec.enforceHostnames
      - isNull:
          path: spec.serverFlag
      - isNull:
          path: spec.clientFlag
      - isNull:
          path: spec.codeSigningFlag
      - isNull:
          path: spec.emailProtectionFlag
      - isNull:
          path: spec.keyUsage
      - isNull:
          path: spec.extKeyUsage
      - isNull:
          path: spec.extKeyUsageOids
      - isNull:
          path: spec.useCSRCommonName
      - isNull:
          path: spec.useCSRSans
      - isNull:
          path: spec.requireCn
      - isNull:
          path: spec.basicConstraintsValidForNonCa
      - isNull:
          path: spec.notBeforeDuration
      - isNull:
          path: spec.generateLease
      - isNull:
          path: spec.noStore
      - isNull:
          path: spec.country
      - isNull:
          path: spec.province
      - isNull:
          path: spec.locality
      - isNull:
          path: spec.organization
      - isNull:
          path: spec.ou
      - isNull:
          path: spec.streetAddress
      - isNull:
          path: spec.postalCode
      - isNull:
          path: spec.serialNumber
      - isNull:
          path: spec.policyIdentifiers
      - isNull:
          path: spec.name
      - isNull:
          path: spec.connection

  - it: should render SAN fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          allowIPSans: true
          allowedURISans:
            - "spiffe://example.com/*"
          allowedOtherSans: "1.2.3.4;UTF8:*"
    asserts:
      - equal:
          path: spec.allowIPSans
          value: true
      - equal:
          path: spec.allowedURISans
          value:
            - "spiffe://example.com/*"
      - equal:
          path: spec.allowedOtherSans
          value: "1.2.3.4;UTF8:*"

  - it: should render flag fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          serverFlag: true
          clientFlag: true
          codeSigningFlag: true
          emailProtectionFlag: true
          enforceHostnames: true
    asserts:
      - equal:
          path: spec.serverFlag
          value: true
      - equal:
          path: spec.clientFlag
          value: true
      - equal:
          path: spec.codeSigningFlag
          value: true
      - equal:
          path: spec.emailProtectionFlag
          value: true
      - equal:
          path: spec.enforceHostnames
          value: true

  - it: should render key usage fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          keyUsage:
            - DigitalSignature
            - KeyEncipherment
          extKeyUsage:
            - ServerAuth
            - ClientAuth
          extKeyUsageOids:
            - "1.3.6.1.5.5.7.3.1"
    asserts:
      - equal:
          path: spec.keyUsage
          value:
            - DigitalSignature
            - KeyEncipherment
      - equal:
          path: spec.extKeyUsage
          value:
            - ServerAuth
            - ClientAuth
      - equal:
          path: spec.extKeyUsageOids
          value:
            - "1.3.6.1.5.5.7.3.1"

  - it: should render CSR and constraint fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          useCSRCommonName: true
          useCSRSans: true
          requireCn: false
          basicConstraintsValidForNonCa: true
          notBeforeDuration: "60s"
    asserts:
      - equal:
          path: spec.useCSRCommonName
          value: true
      - equal:
          path: spec.useCSRSans
          value: true
      - equal:
          path: spec.requireCn
          value: false
      - equal:
          path: spec.basicConstraintsValidForNonCa
          value: true
      - equal:
          path: spec.notBeforeDuration
          value: "60s"

  - it: should render lease and storage fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          generateLease: true
          noStore: true
    asserts:
      - equal:
          path: spec.generateLease
          value: true
      - equal:
          path: spec.noStore
          value: true

  - it: should render subject fields when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          country: "FR"
          province: "Ile-de-France"
          locality: "Paris"
          organization: "Example Inc"
          ou: "Engineering"
          streetAddress: "123 Main St"
          postalCode: "75001"
          serialNumber: "ABC123"
    asserts:
      - equal:
          path: spec.country
          value: "FR"
      - equal:
          path: spec.province
          value: "Ile-de-France"
      - equal:
          path: spec.locality
          value: "Paris"
      - equal:
          path: spec.organization
          value: "Example Inc"
      - equal:
          path: spec.ou
          value: "Engineering"
      - equal:
          path: spec.streetAddress
          value: "123 Main St"
      - equal:
          path: spec.postalCode
          value: "75001"
      - equal:
          path: spec.serialNumber
          value: "ABC123"

  - it: should render policyIdentifiers when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          policyIdentifiers:
            - "1.2.3.4.5"
            - "1.2.3.4.6"
    asserts:
      - equal:
          path: spec.policyIdentifiers
          value:
            - "1.2.3.4.5"
            - "1.2.3.4.6"

  - it: should allow overriding vault name
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
          name: custom-vault-name
    asserts:
      - equal:
          path: spec.name
          value: custom-vault-name

  - it: should render connection when specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: pki
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      pkiSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      pkiSecretEngineRoles:
        web-certs:
          authentication:
            role: vault-admin
          path: pki
          allowedDomains:
            - "example.com"
        api-certs:
          authentication:
            role: vault-admin
          path: pki
          allowedDomains:
            - "api.example.com"
    asserts:
      - hasDocuments:
          count: 2
