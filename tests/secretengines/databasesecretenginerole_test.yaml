---
suite: DatabaseSecretEngineRole
templates:
  - secretengines/databasesecretenginerole.yaml

tests:
  - it: should not render when databaseSecretEngineRoles is empty
    set:
      databaseSecretEngineRoles: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      databaseSecretEngineRoles:
        disabled-role: null
        active-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: DatabaseSecretEngineRole

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-role-dbrole$"

  - it: should use dict key as vault name by default
    set:
      databaseSecretEngineRoles:
        my-db-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - equal:
          path: spec.name
          value: my-db-role

  - it: should allow overriding vault name
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          name: custom-role-name
          path: database
          dBName: my-db
    asserts:
      - equal:
          path: spec.name
          value: custom-role-name

  - it: should apply authentication defaults
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - isNull:
          path: spec.authentication.namespace

  - it: should allow overriding all authentication fields
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
            path: custom-auth
            namespace: vault-ns
            serviceAccount:
              name: my-sa
          path: database
          dBName: my-db
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns

  - it: should apply TTL defaults
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - equal:
          path: spec.defaultTTL
          value: "0s"
      - equal:
          path: spec.maxTTL
          value: "0s"

  - it: should allow overriding TTLs
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          defaultTTL: 1h
          maxTTL: 24h
    asserts:
      - equal:
          path: spec.defaultTTL
          value: "1h"
      - equal:
          path: spec.maxTTL
          value: "24h"

  - it: should fail when authentication.role is missing
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication: {}
          path: database
          dBName: my-db
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineRoles.my-role.authentication.role is required"

  - it: should fail when path is missing
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          dBName: my-db
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineRoles.my-role.path is required"

  - it: should fail when dBName is missing
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineRoles.my-role.dBName is required"

  - it: should render creationStatements when set
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          creationStatements:
            - "CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';"
            - "GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"{{name}}\";"
    asserts:
      - equal:
          path: spec.creationStatements[0]
          value: "CREATE ROLE \"{{name}}\" WITH LOGIN PASSWORD '{{password}}' VALID UNTIL '{{expiration}}';"
      - equal:
          path: spec.creationStatements[1]
          value: "GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"{{name}}\";"

  - it: should not render creationStatements when not set
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - isNull:
          path: spec.creationStatements

  - it: should render renewStatements when set
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          renewStatements:
            - "ALTER ROLE \"{{name}}\" VALID UNTIL '{{expiration}}';"
    asserts:
      - equal:
          path: spec.renewStatements[0]
          value: "ALTER ROLE \"{{name}}\" VALID UNTIL '{{expiration}}';"

  - it: should render revocationStatements when set
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          revocationStatements:
            - "REVOKE ALL PRIVILEGES ON ALL TABLES IN SCHEMA public FROM \"{{name}}\";"
            - "DROP ROLE IF EXISTS \"{{name}}\";"
    asserts:
      - equal:
          path: spec.revocationStatements[0]
          value: "REVOKE ALL PRIVILEGES ON ALL TABLES IN SCHEMA public FROM \"{{name}}\";"
      - equal:
          path: spec.revocationStatements[1]
          value: "DROP ROLE IF EXISTS \"{{name}}\";"

  - it: should render rollbackStatements when set
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          rollbackStatements:
            - "DROP ROLE IF EXISTS \"{{name}}\";"
    asserts:
      - equal:
          path: spec.rollbackStatements[0]
          value: "DROP ROLE IF EXISTS \"{{name}}\";"

  - it: should not render statement fields when not set
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - isNull:
          path: spec.renewStatements
      - isNull:
          path: spec.revocationStatements
      - isNull:
          path: spec.rollbackStatements

  - it: should render connection when specified
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: database
          dBName: my-db
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      databaseSecretEngineRoles:
        first-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
        second-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      databaseSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
