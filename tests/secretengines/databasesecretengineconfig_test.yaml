---
suite: DatabaseSecretEngineConfig
templates:
  - secretengines/databasesecretengineconfig.yaml

tests:
  - it: should not render when databaseSecretEngineConfigs is empty
    set:
      databaseSecretEngineConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      databaseSecretEngineConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: DatabaseSecretEngineConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-db-dbconfig$"

  - it: should use dict key as vault name by default
    set:
      databaseSecretEngineConfigs:
        my-postgres:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.name
          value: my-postgres

  - it: should allow overriding vault name
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          name: custom-db-name
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.name
          value: custom-db-name

  - it: should apply authentication defaults
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - isNull:
          path: spec.authentication.namespace

  - it: should allow overriding all authentication fields
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
            path: custom-auth
            namespace: vault-ns
            serviceAccount:
              name: my-sa
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns

  - it: should render required fields
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.path
          value: database
      - equal:
          path: spec.pluginName
          value: postgresql-database-plugin
      - equal:
          path: spec.connectionURL
          value: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"

  - it: should fail when authentication.role is missing
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication: {}
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.authentication.role is required"

  - it: should fail when path is missing
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.path is required"

  - it: should fail when pluginName is missing
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.pluginName is required"

  - it: should fail when connectionURL is missing
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.connectionURL is required"

  - it: should render rootCredentials with k8s secret
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.rootCredentials.secret.name
          value: postgres-creds
      - isNull:
          path: spec.rootCredentials.vaultSecret
      - isNull:
          path: spec.rootCredentials.randomSecret

  - it: should render rootCredentials with vault secret
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            vaultSecret:
              path: secret/data/db-creds
    asserts:
      - equal:
          path: spec.rootCredentials.vaultSecret.path
          value: secret/data/db-creds
      - isNull:
          path: spec.rootCredentials.secret
      - isNull:
          path: spec.rootCredentials.randomSecret

  - it: should render rootCredentials with random secret
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            randomSecret:
              name: my-random-secret
    asserts:
      - equal:
          path: spec.rootCredentials.randomSecret.name
          value: my-random-secret
      - isNull:
          path: spec.rootCredentials.secret
      - isNull:
          path: spec.rootCredentials.vaultSecret

  - it: should render rootCredentials custom keys
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
            passwordKey: db-password
            usernameKey: db-user
    asserts:
      - equal:
          path: spec.rootCredentials.passwordKey
          value: db-password
      - equal:
          path: spec.rootCredentials.usernameKey
          value: db-user

  - it: should fail when both secret and vaultSecret are set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
            vaultSecret:
              path: secret/data/creds
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.rootCredentials: specify only one of secret, vaultSecret, or randomSecret"

  - it: should fail when both secret and randomSecret are set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
            randomSecret:
              name: my-random
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.rootCredentials: specify only one of secret, vaultSecret, or randomSecret"

  - it: should fail when both vaultSecret and randomSecret are set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            vaultSecret:
              path: secret/data/creds
            randomSecret:
              name: my-random
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineConfigs.my-db.rootCredentials: specify only one of secret, vaultSecret, or randomSecret"

  - it: should render allowedRoles when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          allowedRoles:
            - my-role
            - other-role
    asserts:
      - equal:
          path: spec.allowedRoles
          value:
            - my-role
            - other-role

  - it: should not render allowedRoles when not set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - isNull:
          path: spec.allowedRoles

  - it: should render databaseSpecificConfig when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          databaseSpecificConfig:
            sslmode: require
            connect_timeout: "10"
    asserts:
      - equal:
          path: spec.databaseSpecificConfig.sslmode
          value: require
      - equal:
          path: spec.databaseSpecificConfig.connect_timeout
          value: "10"

  - it: should render pluginVersion when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          pluginVersion: "1.0.0"
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.pluginVersion
          value: "1.0.0"

  - it: should not render pluginVersion when not set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - isNull:
          path: spec.pluginVersion

  - it: should render disableEscaping when explicitly set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          disableEscaping: true
    asserts:
      - equal:
          path: spec.disableEscaping
          value: true

  - it: should not render disableEscaping when not set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - isNull:
          path: spec.disableEscaping

  - it: should render passwordAuthentication when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          passwordAuthentication: scram-sha-256
    asserts:
      - equal:
          path: spec.passwordAuthentication
          value: scram-sha-256

  - it: should render passwordPolicy when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          passwordPolicy: my-policy
    asserts:
      - equal:
          path: spec.passwordPolicy
          value: my-policy

  - it: should render rootPasswordRotation when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          rootPasswordRotation:
            enable: true
            rotationPeriod: 24h
    asserts:
      - equal:
          path: spec.rootPasswordRotation.enable
          value: true
      - equal:
          path: spec.rootPasswordRotation.rotationPeriod
          value: "24h"

  - it: should render rootRotationStatements when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          rootRotationStatements:
            - "ALTER USER \"{{name}}\" WITH PASSWORD '{{password}}'"
    asserts:
      - equal:
          path: spec.rootRotationStatements[0]
          value: "ALTER USER \"{{name}}\" WITH PASSWORD '{{password}}'"

  - it: should render username when set
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          username: postgres-admin
    asserts:
      - equal:
          path: spec.username
          value: postgres-admin

  - it: should render verifyConnection false
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
          verifyConnection: false
    asserts:
      - equal:
          path: spec.verifyConnection
          value: false

  - it: should render connection when specified
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      databaseSecretEngineConfigs:
        first-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/db1"
          rootCredentials:
            secret:
              name: postgres-creds-1
        second-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: mysql-database-plugin
          connectionURL: "{{username}}:{{password}}@tcp(mysql:3306)/mydb"
          rootCredentials:
            secret:
              name: mysql-creds
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      databaseSecretEngineConfigs:
        my-db:
          authentication:
            role: vault-admin
          path: database
          pluginName: postgresql-database-plugin
          connectionURL: "postgresql://{{username}}:{{password}}@postgres:5432/mydb"
          rootCredentials:
            secret:
              name: postgres-creds
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
