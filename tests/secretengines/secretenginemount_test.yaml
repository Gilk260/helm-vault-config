---
suite: SecretEngineMount
templates:
  - secretengines/secretenginemounts.yaml

tests:
  - it: should not render when secretEngineMounts is empty
    set:
      secretEngineMounts: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      secretEngineMounts:
        disabled-mount: null
        active-mount:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: SecretEngineMount

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      secretEngineMounts:
        kv-engine:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-kv-engine-secretenginemount$"

  - it: should use dict key as vault name by default
    set:
      secretEngineMounts:
        my-kv-engine:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - equal:
          path: spec.name
          value: my-kv-engine

  - it: should allow overriding vault name
    set:
      secretEngineMounts:
        my-mount:
          authentication:
            role: vault-admin
          type: kv
          name: custom-mount-name
    asserts:
      - equal:
          path: spec.name
          value: custom-mount-name

  - it: should fail when type is missing
    set:
      secretEngineMounts:
        my-mount:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "secretEngineMounts.my-mount.type is required"

  - it: should fail when authentication.role is missing
    set:
      secretEngineMounts:
        my-mount:
          authentication: {}
          type: kv
    asserts:
      - failedTemplate:
          errorMessage: "secretEngineMounts.my-mount.authentication.role is required"

  - it: should apply sensible defaults
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.type
          value: kv

  - it: should default options to KV v2
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - equal:
          path: spec.options.version
          value: "2"

  - it: should allow overriding options
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
          options:
            version: "1"
    asserts:
      - equal:
          path: spec.options.version
          value: "1"

  - it: should allow overriding all auth defaults
    set:
      secretEngineMounts:
        my-mount:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          type: kv
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns

  - it: should render config when specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
          config:
            defaultLeaseTTL: 1h
            maxLeaseTTL: 24h
            forceNoCache: true
    asserts:
      - equal:
          path: spec.config.defaultLeaseTTL
          value: 1h
      - equal:
          path: spec.config.maxLeaseTTL
          value: 24h
      - equal:
          path: spec.config.forceNoCache
          value: true

  - it: should not render config when not specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - isNull:
          path: spec.config

  - it: should render path when specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
          path: custom/path
    asserts:
      - equal:
          path: spec.path
          value: custom/path

  - it: should not render path when not specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - isNull:
          path: spec.path

  - it: should render description when specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
          description: KV secrets engine for app credentials
    asserts:
      - equal:
          path: spec.description
          value: KV secrets engine for app credentials

  - it: should render boolean fields only when true
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
          local: true
          sealWrap: true
          externalEntropyAccess: true
    asserts:
      - equal:
          path: spec.local
          value: true
      - equal:
          path: spec.sealWrap
          value: true
      - equal:
          path: spec.externalEntropyAccess
          value: true

  - it: should not render boolean fields when not specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - isNull:
          path: spec.local
      - isNull:
          path: spec.sealWrap
      - isNull:
          path: spec.externalEntropyAccess

  - it: should render connection when specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      secretEngineMounts:
        kv-engine:
          authentication:
            role: vault-admin
          type: kv
        pki-engine:
          authentication:
            role: vault-admin
          type: pki
          options:
            max_path_length: "2"
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      secretEngineMounts:
        my-kv:
          authentication:
            role: vault-admin
          type: kv
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
