---
suite: DatabaseSecretEngineStaticRole
templates:
  - secretengines/databasesecretenginestaticrole.yaml

tests:
  - it: should not render when databaseSecretEngineStaticRoles is empty
    set:
      databaseSecretEngineStaticRoles: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      databaseSecretEngineStaticRoles:
        disabled-role: null
        active-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: DatabaseSecretEngineStaticRole

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-static-role-dbstaticrole$"

  - it: should use dict key as vault name by default
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - equal:
          path: spec.name
          value: my-static-role

  - it: should allow overriding vault name
    set:
      databaseSecretEngineStaticRoles:
        my-role:
          authentication:
            role: vault-admin
          name: custom-static-name
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - equal:
          path: spec.name
          value: custom-static-name

  - it: should apply authentication defaults
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - isNull:
          path: spec.authentication.namespace

  - it: should allow overriding all authentication fields
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
            path: custom-auth
            namespace: vault-ns
            serviceAccount:
              name: my-sa
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns

  - it: should render required fields
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - equal:
          path: spec.path
          value: database
      - equal:
          path: spec.dBName
          value: my-db
      - equal:
          path: spec.username
          value: app-user
      - equal:
          path: spec.rotationPeriod
          value: 86400

  - it: should fail when authentication.role is missing
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication: {}
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineStaticRoles.my-static-role.authentication.role is required"

  - it: should fail when path is missing
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineStaticRoles.my-static-role.path is required"

  - it: should fail when dBName is missing
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          username: app-user
          rotationPeriod: 86400
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineStaticRoles.my-static-role.dBName is required"

  - it: should fail when username is missing
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          rotationPeriod: 86400
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineStaticRoles.my-static-role.username is required"

  - it: should fail when rotationPeriod is missing
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
    asserts:
      - failedTemplate:
          errorMessage: "databaseSecretEngineStaticRoles.my-static-role.rotationPeriod is required"

  - it: should render credentialType when set
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
          credentialType: password
    asserts:
      - equal:
          path: spec.credentialType
          value: password

  - it: should not render credentialType when not set
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - isNull:
          path: spec.credentialType

  - it: should render passwordCredentialConfig when set
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
          credentialType: password
          passwordCredentialConfig:
            passwordPolicy: my-policy
    asserts:
      - equal:
          path: spec.passwordCredentialConfig.passwordPolicy
          value: my-policy

  - it: should render rsaPrivateKeyCredentialConfig when set
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
          credentialType: rsa_private_key
          rsaPrivateKeyCredentialConfig:
            format: pkcs8
            keyBits: 4096
    asserts:
      - equal:
          path: spec.rsaPrivateKeyCredentialConfig.format
          value: pkcs8
      - equal:
          path: spec.rsaPrivateKeyCredentialConfig.keyBits
          value: 4096

  - it: should render rotationStatements when set
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
          rotationStatements:
            - "ALTER USER \"{{name}}\" WITH PASSWORD '{{password}}';"
    asserts:
      - equal:
          path: spec.rotationStatements[0]
          value: "ALTER USER \"{{name}}\" WITH PASSWORD '{{password}}';"

  - it: should not render rotationStatements when not set
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - isNull:
          path: spec.rotationStatements

  - it: should render connection when specified
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      databaseSecretEngineStaticRoles:
        first-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: user-one
          rotationPeriod: 86400
        second-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: user-two
          rotationPeriod: 3600
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      databaseSecretEngineStaticRoles:
        my-static-role:
          authentication:
            role: vault-admin
          path: database
          dBName: my-db
          username: app-user
          rotationPeriod: 86400
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
