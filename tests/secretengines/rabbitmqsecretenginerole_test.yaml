---
suite: RabbitMQSecretEngineRole
templates:
  - secretengines/rabbitmqsecretenginerole.yaml

tests:
  - it: should not render when rabbitmqSecretEngineRoles is empty
    set:
      rabbitmqSecretEngineRoles: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      rabbitmqSecretEngineRoles:
        disabled-role: null
        active-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: RabbitMQSecretEngineRole

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-role-rabbitmqsecretenginerole$"

  - it: should include common labels
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should apply authentication defaults
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default

  - it: should allow overriding authentication defaults
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-enterprise
          path: rabbitmq
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-enterprise

  - it: should not render authentication.namespace when not set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNull:
          path: spec.authentication.namespace

  - it: should render path
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq/prod
    asserts:
      - equal:
          path: spec.path
          value: rabbitmq/prod

  - it: should render name override when set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
          name: custom-vault-name
    asserts:
      - equal:
          path: spec.name
          value: custom-vault-name

  - it: should not render name when not set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNull:
          path: spec.name

  - it: should render tags when set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
          tags: "administrator,monitoring"
    asserts:
      - equal:
          path: spec.tags
          value: "administrator,monitoring"

  - it: should not render tags when not set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNull:
          path: spec.tags

  - it: should render vhosts with permissions
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
          vhosts:
            - vhostName: "/"
              permissions:
                configure: ".*"
                read: ".*"
                write: ".*"
            - vhostName: "/production"
              permissions:
                read: ".*"
    asserts:
      - equal:
          path: spec.vhosts[0].vhostName
          value: "/"
      - equal:
          path: spec.vhosts[0].permissions.configure
          value: ".*"
      - equal:
          path: spec.vhosts[0].permissions.read
          value: ".*"
      - equal:
          path: spec.vhosts[0].permissions.write
          value: ".*"
      - equal:
          path: spec.vhosts[1].vhostName
          value: "/production"
      - equal:
          path: spec.vhosts[1].permissions.read
          value: ".*"

  - it: should not render vhosts when not set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNull:
          path: spec.vhosts

  - it: should render vhostTopics with nested topics and permissions
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
          vhostTopics:
            - vhostName: "/"
              topics:
                - topicName: "amq.topic"
                  permissions:
                    configure: ""
                    read: "^logs\\."
                    write: "^events\\."
    asserts:
      - equal:
          path: spec.vhostTopics[0].vhostName
          value: "/"
      - equal:
          path: spec.vhostTopics[0].topics[0].topicName
          value: "amq.topic"
      - equal:
          path: spec.vhostTopics[0].topics[0].permissions.configure
          value: ""
      - equal:
          path: spec.vhostTopics[0].topics[0].permissions.read
          value: "^logs\\."
      - equal:
          path: spec.vhostTopics[0].topics[0].permissions.write
          value: "^events\\."

  - it: should not render vhostTopics when not set
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNull:
          path: spec.vhostTopics

  - it: should render connection when specified
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: rabbitmq
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: rabbitmq
    asserts:
      - isNull:
          path: spec.connection

  - it: should fail when authentication.role is missing
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication: {}
          path: rabbitmq
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmqSecretEngineRoles.my-role.authentication.role is required"

  - it: should fail when path is missing
    set:
      rabbitmqSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "rabbitmqSecretEngineRoles.my-role.path is required"

  - it: should render multiple resources
    set:
      rabbitmqSecretEngineRoles:
        first-role:
          authentication:
            role: vault-admin
          path: rabbitmq
          tags: administrator
        second-role:
          authentication:
            role: vault-admin
          path: rabbitmq
          tags: monitoring
    asserts:
      - hasDocuments:
          count: 2

  - it: should render all optional fields together
    set:
      rabbitmqSecretEngineRoles:
        full-role:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 5
          path: rabbitmq/prod
          name: custom-name
          tags: "administrator,monitoring"
          vhosts:
            - vhostName: "/"
              permissions:
                configure: ".*"
                read: ".*"
                write: ".*"
          vhostTopics:
            - vhostName: "/"
              topics:
                - topicName: "amq.topic"
                  permissions:
                    read: ".*"
                    write: ".*"
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.namespace
          value: vault-ns
      - equal:
          path: spec.path
          value: rabbitmq/prod
      - equal:
          path: spec.name
          value: custom-name
      - equal:
          path: spec.tags
          value: "administrator,monitoring"
      - equal:
          path: spec.vhosts[0].vhostName
          value: "/"
      - equal:
          path: spec.vhosts[0].permissions.configure
          value: ".*"
      - equal:
          path: spec.vhostTopics[0].vhostName
          value: "/"
      - equal:
          path: spec.vhostTopics[0].topics[0].topicName
          value: "amq.topic"
