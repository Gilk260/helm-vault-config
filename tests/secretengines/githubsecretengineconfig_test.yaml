---
suite: GitHubSecretEngineConfig
templates:
  - secretengines/githubsecretengineconfig.yaml

tests:
  - it: should not render when githubSecretEngineConfigs is empty
    set:
      githubSecretEngineConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      githubSecretEngineConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: GitHubSecretEngineConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      githubSecretEngineConfigs:
        my-gh-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-gh-config-githubsecretengineconfig$"

  - it: should apply sensible defaults
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.gitHubAPIBaseURL
          value: "https://api.github.com"

  - it: should allow overriding all defaults
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          applicationID: 99999
          gitHubAPIBaseURL: "https://github.example.com/api/v3"
          path: github-enterprise
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns
      - equal:
          path: spec.applicationID
          value: 99999
      - equal:
          path: spec.gitHubAPIBaseURL
          value: "https://github.example.com/api/v3"
      - equal:
          path: spec.path
          value: github-enterprise

  - it: should fail when authentication.role is missing
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication: {}
          applicationID: 12345
          path: github
    asserts:
      - failedTemplate:
          errorMessage: "githubSecretEngineConfigs.my-config.authentication.role is required"

  - it: should fail when applicationID is missing
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - failedTemplate:
          errorMessage: "githubSecretEngineConfigs.my-config.applicationID is required"

  - it: should fail when path is missing
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
    asserts:
      - failedTemplate:
          errorMessage: "githubSecretEngineConfigs.my-config.path is required"

  - it: should render sSHKeyReference with secret
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
          sSHKeyReference:
            secret:
              name: my-ssh-secret
    asserts:
      - equal:
          path: spec.sSHKeyReference.secret.name
          value: my-ssh-secret
      - isNull:
          path: spec.sSHKeyReference.vaultSecret

  - it: should render sSHKeyReference with vaultSecret
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
          sSHKeyReference:
            vaultSecret:
              path: secret/data/github-ssh-key
    asserts:
      - equal:
          path: spec.sSHKeyReference.vaultSecret.path
          value: secret/data/github-ssh-key
      - isNull:
          path: spec.sSHKeyReference.secret

  - it: should not render sSHKeyReference when not specified
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - isNull:
          path: spec.sSHKeyReference

  - it: should render connection when specified
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          applicationID: 12345
          path: github
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - isNull:
          path: spec.connection

  - it: should render connection with tLSConfig
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          connection:
            address: "https://vault.example.com:8200"
            tLSConfig:
              cacert: /etc/ssl/certs/ca.pem
              skipVerify: false
              tlsSecret:
                name: vault-tls
              tlsServerName: vault.example.com
          applicationID: 12345
          path: github
    asserts:
      - equal:
          path: spec.connection.tLSConfig.cacert
          value: /etc/ssl/certs/ca.pem
      - equal:
          path: spec.connection.tLSConfig.skipVerify
          value: false
      - equal:
          path: spec.connection.tLSConfig.tlsSecret.name
          value: vault-tls
      - equal:
          path: spec.connection.tLSConfig.tlsServerName
          value: vault.example.com

  - it: should render multiple resources
    set:
      githubSecretEngineConfigs:
        first-config:
          authentication:
            role: vault-admin
          applicationID: 11111
          path: github-first
        second-config:
          authentication:
            role: vault-admin
          applicationID: 22222
          path: github-second
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      githubSecretEngineConfigs:
        my-config:
          authentication:
            role: vault-admin
          applicationID: 12345
          path: github
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
