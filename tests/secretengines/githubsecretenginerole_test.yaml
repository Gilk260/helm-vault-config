---
suite: GitHubSecretEngineRole
templates:
  - secretengines/githubsecretenginerole.yaml

tests:
  - it: should not render when githubSecretEngineRoles is empty
    set:
      githubSecretEngineRoles: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      githubSecretEngineRoles:
        disabled-role: null
        active-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: GitHubSecretEngineRole

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      githubSecretEngineRoles:
        my-gh-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-gh-role-githubsecretenginerole$"

  - it: should apply sensible defaults
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default

  - it: should allow overriding all authentication defaults
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          path: github
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns

  - it: should fail when authentication.role is missing
    set:
      githubSecretEngineRoles:
        my-role:
          authentication: {}
          path: github
    asserts:
      - failedTemplate:
          errorMessage: "githubSecretEngineRoles.my-role.authentication.role is required"

  - it: should fail when path is missing
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "githubSecretEngineRoles.my-role.path is required"

  - it: should render installationID when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
          installationID: 98765
    asserts:
      - equal:
          path: spec.installationID
          value: 98765

  - it: should not render installationID when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.installationID

  - it: should render organizationName when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
          organizationName: my-org
    asserts:
      - equal:
          path: spec.organizationName
          value: my-org

  - it: should not render organizationName when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.organizationName

  - it: should render name override when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
          name: custom-vault-name
    asserts:
      - equal:
          path: spec.name
          value: custom-vault-name

  - it: should not render name when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.name

  - it: should render permissions when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
          permissions:
            contents: read
            issues: write
            pull_requests: write
    asserts:
      - equal:
          path: spec.permissions.contents
          value: read
      - equal:
          path: spec.permissions.issues
          value: write
      - equal:
          path: spec.permissions.pull_requests
          value: write

  - it: should not render permissions when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.permissions

  - it: should render repositories when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
          repositories:
            - my-repo
            - another-repo
    asserts:
      - equal:
          path: spec.repositories
          value:
            - my-repo
            - another-repo

  - it: should not render repositories when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.repositories

  - it: should render repositoriesIDs when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
          repositoriesIDs:
            - "123456"
            - "789012"
    asserts:
      - equal:
          path: spec.repositoriesIDs
          value:
            - "123456"
            - "789012"

  - it: should not render repositoriesIDs when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.repositoriesIDs

  - it: should render connection when specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: github
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNull:
          path: spec.connection

  - it: should render connection with tLSConfig
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          connection:
            address: "https://vault.example.com:8200"
            tLSConfig:
              cacert: /etc/ssl/certs/ca.pem
              skipVerify: false
              tlsSecret:
                name: vault-tls
              tlsServerName: vault.example.com
          path: github
    asserts:
      - equal:
          path: spec.connection.tLSConfig.cacert
          value: /etc/ssl/certs/ca.pem
      - equal:
          path: spec.connection.tLSConfig.skipVerify
          value: false
      - equal:
          path: spec.connection.tLSConfig.tlsSecret.name
          value: vault-tls
      - equal:
          path: spec.connection.tLSConfig.tlsServerName
          value: vault.example.com

  - it: should render all fields together
    set:
      githubSecretEngineRoles:
        full-role:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
          path: github
          name: custom-name
          installationID: 98765
          organizationName: my-org
          permissions:
            contents: read
            issues: write
          repositories:
            - my-repo
          repositoriesIDs:
            - "123456"
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.path
          value: github
      - equal:
          path: spec.name
          value: custom-name
      - equal:
          path: spec.installationID
          value: 98765
      - equal:
          path: spec.organizationName
          value: my-org
      - equal:
          path: spec.permissions.contents
          value: read
      - equal:
          path: spec.repositories
          value:
            - my-repo
      - equal:
          path: spec.repositoriesIDs
          value:
            - "123456"

  - it: should render multiple resources
    set:
      githubSecretEngineRoles:
        first-role:
          authentication:
            role: vault-admin
          path: github
        second-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      githubSecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: github
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
