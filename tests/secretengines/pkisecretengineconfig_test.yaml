---
suite: PKISecretEngineConfig
templates:
  - secretengines/pkisecretengineconfig.yaml

tests:
  - it: should not render when pkiSecretEngineConfigs is empty
    set:
      pkiSecretEngineConfigs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      pkiSecretEngineConfigs:
        disabled-config: null
        active-config:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: PKISecretEngineConfig

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      pkiSecretEngineConfigs:
        root-ca:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-root-ca-pkisecretengineconfig$"

  - it: should include common labels
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm

  - it: should apply sensible defaults
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.type
          value: root
      - equal:
          path: spec.privateKeyType
          value: internal
      - equal:
          path: spec.format
          value: pem
      - equal:
          path: spec.keyType
          value: rsa
      - equal:
          path: spec.keyBits
          value: 2048
      - equal:
          path: spec.maxPathLength
          value: -1
      - equal:
          path: spec.certificateKey
          value: tls.crt

  - it: should allow overriding all defaults
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: admin
          path: pki
          commonName: "example.com"
          type: intermediate
          privateKeyType: exported
          format: der
          keyType: ec
          keyBits: 256
          maxPathLength: 2
          certificateKey: cert.pem
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: admin
      - equal:
          path: spec.type
          value: intermediate
      - equal:
          path: spec.privateKeyType
          value: exported
      - equal:
          path: spec.format
          value: der
      - equal:
          path: spec.keyType
          value: ec
      - equal:
          path: spec.keyBits
          value: 256
      - equal:
          path: spec.maxPathLength
          value: 2
      - equal:
          path: spec.certificateKey
          value: cert.pem

  - it: should fail when authentication.role is missing
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication: {}
          path: pki
          commonName: "example.com"
    asserts:
      - failedTemplate:
          errorMessage: "pkiSecretEngineConfigs.my-pki.authentication.role is required"

  - it: should fail when path is missing
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          commonName: "example.com"
    asserts:
      - failedTemplate:
          errorMessage: "pkiSecretEngineConfigs.my-pki.path is required"

  - it: should fail when commonName is missing
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
    asserts:
      - failedTemplate:
          errorMessage: "pkiSecretEngineConfigs.my-pki.commonName is required"

  - it: should render TTL and CRL fields when specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
          TTL: "8760h"
          CRLExpiry: "168h"
          CRLDisable: true
          CRLDistributionPoints:
            - "http://crl.example.com/root.crl"
            - "http://crl2.example.com/root.crl"
    asserts:
      - equal:
          path: spec.TTL
          value: "8760h"
      - equal:
          path: spec.CRLExpiry
          value: "168h"
      - equal:
          path: spec.CRLDisable
          value: true
      - equal:
          path: spec.CRLDistributionPoints
          value:
            - "http://crl.example.com/root.crl"
            - "http://crl2.example.com/root.crl"

  - it: should not render optional fields when not specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - isNull:
          path: spec.TTL
      - isNull:
          path: spec.CRLExpiry
      - isNull:
          path: spec.CRLDisable
      - isNull:
          path: spec.CRLDistributionPoints
      - isNull:
          path: spec.altNames
      - isNull:
          path: spec.IPSans
      - isNull:
          path: spec.URISans
      - isNull:
          path: spec.otherSans
      - isNull:
          path: spec.excludeCnFromSans
      - isNull:
          path: spec.country
      - isNull:
          path: spec.province
      - isNull:
          path: spec.locality
      - isNull:
          path: spec.organization
      - isNull:
          path: spec.ou
      - isNull:
          path: spec.streetAddress
      - isNull:
          path: spec.postalCode
      - isNull:
          path: spec.serialNumber
      - isNull:
          path: spec.privateKeyFormat
      - isNull:
          path: spec.issuingCertificates
      - isNull:
          path: spec.ocspServers
      - isNull:
          path: spec.permittedDnsDomains
      - isNull:
          path: spec.internalSign
      - isNull:
          path: spec.externalSignSecret
      - isNull:
          path: spec.connection

  - it: should render SAN fields when specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
          altNames: "www.example.com,mail.example.com"
          IPSans: "10.0.0.1,10.0.0.2"
          URISans: "spiffe://example.com/host"
          otherSans: "1.2.3.4;UTF8:test"
          excludeCnFromSans: true
    asserts:
      - equal:
          path: spec.altNames
          value: "www.example.com,mail.example.com"
      - equal:
          path: spec.IPSans
          value: "10.0.0.1,10.0.0.2"
      - equal:
          path: spec.URISans
          value: "spiffe://example.com/host"
      - equal:
          path: spec.otherSans
          value: "1.2.3.4;UTF8:test"
      - equal:
          path: spec.excludeCnFromSans
          value: true

  - it: should render subject fields when specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
          country: "FR"
          province: "Ile-de-France"
          locality: "Paris"
          organization: "Example Inc"
          ou: "Engineering"
          streetAddress: "123 Main St"
          postalCode: "75001"
          serialNumber: "ABC123"
    asserts:
      - equal:
          path: spec.country
          value: "FR"
      - equal:
          path: spec.province
          value: "Ile-de-France"
      - equal:
          path: spec.locality
          value: "Paris"
      - equal:
          path: spec.organization
          value: "Example Inc"
      - equal:
          path: spec.ou
          value: "Engineering"
      - equal:
          path: spec.streetAddress
          value: "123 Main St"
      - equal:
          path: spec.postalCode
          value: "75001"
      - equal:
          path: spec.serialNumber
          value: "ABC123"

  - it: should render URL list fields when specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
          issuingCertificates:
            - "http://ca.example.com/ca.crt"
          ocspServers:
            - "http://ocsp.example.com"
          permittedDnsDomains:
            - "example.com"
            - "sub.example.com"
    asserts:
      - equal:
          path: spec.issuingCertificates
          value:
            - "http://ca.example.com/ca.crt"
      - equal:
          path: spec.ocspServers
          value:
            - "http://ocsp.example.com"
      - equal:
          path: spec.permittedDnsDomains
          value:
            - "example.com"
            - "sub.example.com"

  - it: should render internalSign when specified
    set:
      pkiSecretEngineConfigs:
        my-intermediate:
          authentication:
            role: vault-admin
          path: pki-int
          commonName: "Intermediate CA"
          type: intermediate
          internalSign:
            name: root-ca
    asserts:
      - equal:
          path: spec.internalSign.name
          value: root-ca

  - it: should render externalSignSecret when specified
    set:
      pkiSecretEngineConfigs:
        my-intermediate:
          authentication:
            role: vault-admin
          path: pki-int
          commonName: "Intermediate CA"
          type: intermediate
          externalSignSecret:
            name: signed-cert-secret
    asserts:
      - equal:
          path: spec.externalSignSecret.name
          value: signed-cert-secret

  - it: should render privateKeyFormat when specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
          privateKeyFormat: pkcs8
    asserts:
      - equal:
          path: spec.privateKeyFormat
          value: pkcs8

  - it: should render connection when specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
          path: pki
          commonName: "example.com"
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      pkiSecretEngineConfigs:
        my-pki:
          authentication:
            role: vault-admin
          path: pki
          commonName: "example.com"
    asserts:
      - isNull:
          path: spec.connection

  - it: should render multiple resources
    set:
      pkiSecretEngineConfigs:
        root-ca:
          authentication:
            role: vault-admin
          path: pki
          commonName: "Root CA"
        intermediate-ca:
          authentication:
            role: vault-admin
          path: pki-int
          commonName: "Intermediate CA"
          type: intermediate
    asserts:
      - hasDocuments:
          count: 2
