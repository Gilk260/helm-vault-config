---
suite: QuaySecretEngineRole
templates:
  - secretengines/quaysecretenginerole.yaml

tests:
  - it: should not render when quaySecretEngineRoles is empty
    set:
      quaySecretEngineRoles: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should skip null entries (override to disable)
    set:
      quaySecretEngineRoles:
        disabled-role: null
        active-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - hasDocuments:
          count: 1

  - it: should render correct apiVersion and kind
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isAPIVersion:
          of: redhatcop.redhat.io/v1alpha1
      - isKind:
          of: QuaySecretEngineRole

  - it: should generate resource name with chart prefix
    release:
      name: my-app
    set:
      quaySecretEngineRoles:
        my-quay-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: ".*-my-quay-role-quaysecretenginerole$"

  - it: should use dict key as vault name by default
    set:
      quaySecretEngineRoles:
        my-quay-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - equal:
          path: spec.name
          value: my-quay-role

  - it: should allow overriding vault name
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          name: custom-vault-name
    asserts:
      - equal:
          path: spec.name
          value: custom-vault-name

  - it: should apply sensible defaults
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - equal:
          path: spec.authentication.path
          value: kubernetes
      - equal:
          path: spec.authentication.serviceAccount.name
          value: default
      - equal:
          path: spec.namespaceType
          value: organization
      - equal:
          path: spec.createRepositories
          value: false

  - it: should allow overriding all defaults
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
            path: custom-auth
            serviceAccount:
              name: my-sa
            namespace: vault-ns
          path: quay
          namespaceType: user
          createRepositories: true
    asserts:
      - equal:
          path: spec.authentication.path
          value: custom-auth
      - equal:
          path: spec.authentication.serviceAccount.name
          value: my-sa
      - equal:
          path: spec.authentication.namespace
          value: vault-ns
      - equal:
          path: spec.namespaceType
          value: user
      - equal:
          path: spec.createRepositories
          value: true

  - it: should fail when authentication.role is missing
    set:
      quaySecretEngineRoles:
        my-role:
          authentication: {}
          path: quay
    asserts:
      - failedTemplate:
          errorMessage: "quaySecretEngineRoles.my-role.authentication.role is required"

  - it: should fail when path is missing
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
    asserts:
      - failedTemplate:
          errorMessage: "quaySecretEngineRoles.my-role.path is required"

  - it: should render connection when specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          connection:
            address: "http://openbao.openbao.svc:8200"
            timeOut: "30s"
            maxRetries: 3
    asserts:
      - equal:
          path: spec.connection.address
          value: "http://openbao.openbao.svc:8200"
      - equal:
          path: spec.connection.timeOut
          value: "30s"
      - equal:
          path: spec.connection.maxRetries
          value: 3

  - it: should not render connection when not specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.connection

  - it: should render namespaceName when specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          namespaceName: my-org
    asserts:
      - equal:
          path: spec.namespaceName
          value: my-org

  - it: should not render namespaceName when not specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.namespaceName

  - it: should render defaultPermission when specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          defaultPermission: admin
    asserts:
      - equal:
          path: spec.defaultPermission
          value: admin

  - it: should not render defaultPermission when not specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.defaultPermission

  - it: should render TTL and maxTTL when specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          TTL: "1h"
          maxTTL: "24h"
    asserts:
      - equal:
          path: spec.TTL
          value: "1h"
      - equal:
          path: spec.maxTTL
          value: "24h"

  - it: should not render TTL and maxTTL when not specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.TTL
      - isNull:
          path: spec.maxTTL

  - it: should render repositories when specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          repositories:
            my-repo: read
            other-repo: admin
    asserts:
      - equal:
          path: spec.repositories.my-repo
          value: read
      - equal:
          path: spec.repositories.other-repo
          value: admin

  - it: should not render repositories when not specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.repositories

  - it: should render teams when specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
          teams:
            dev-team: member
            admin-team: admin
    asserts:
      - equal:
          path: spec.teams.dev-team
          value: member
      - equal:
          path: spec.teams.admin-team
          value: admin

  - it: should not render teams when not specified
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNull:
          path: spec.teams

  - it: should render multiple resources
    set:
      quaySecretEngineRoles:
        first-role:
          authentication:
            role: vault-admin
          path: quay
        second-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - hasDocuments:
          count: 2

  - it: should include common labels
    set:
      quaySecretEngineRoles:
        my-role:
          authentication:
            role: vault-admin
          path: quay
    asserts:
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
