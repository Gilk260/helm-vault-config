{{- range $name, $config := .Values.rabbitmqSecretEngineConfigs }}
{{- if $config }}
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: RabbitMQSecretEngineConfig
metadata:
  name: {{ include "vault-config.resourceName" (dict "context" $ "resourceName" $name "resourceType" "rabbitmqsecretengineconfig") }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "vault-config.labels" $ | nindent 4 }}
spec:
  authentication:
    path: {{ default "kubernetes" $config.authentication.path | quote }}
    role: {{ required (printf "rabbitmqSecretEngineConfigs.%s.authentication.role is required" $name) $config.authentication.role | quote }}
    serviceAccount:
      name: {{ default "default" ($config.authentication.serviceAccount).name | quote }}
    {{- with $config.authentication.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  {{- with $config.connection }}
  connection:
    address: {{ .address | quote }}
    {{- with .maxRetries }}
    maxRetries: {{ . }}
    {{- end }}
    {{- with .timeOut }}
    timeOut: {{ . | quote }}
    {{- end }}
    {{- with .tLSConfig }}
    tLSConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  connectionURI: {{ required (printf "rabbitmqSecretEngineConfigs.%s.connectionURI is required" $name) $config.connectionURI | quote }}
  path: {{ required (printf "rabbitmqSecretEngineConfigs.%s.path is required" $name) $config.path | quote }}
  rootCredentials:
    {{- if and (not $config.rootCredentials.secret) (not $config.rootCredentials.vaultSecret) (not $config.rootCredentials.randomSecret) }}
    {{- fail (printf "rabbitmqSecretEngineConfigs.%s.rootCredentials: one of secret, vaultSecret, or randomSecret is required" $name) }}
    {{- end }}
    {{- if $config.rootCredentials.secret }}
    secret:
      name: {{ $config.rootCredentials.secret.name | quote }}
    {{- end }}
    {{- if $config.rootCredentials.vaultSecret }}
    vaultSecret:
      path: {{ $config.rootCredentials.vaultSecret.path | quote }}
    {{- end }}
    {{- if $config.rootCredentials.randomSecret }}
    randomSecret:
      name: {{ $config.rootCredentials.randomSecret.name | quote }}
    {{- end }}
    {{- with $config.rootCredentials.usernameKey }}
    usernameKey: {{ . | quote }}
    {{- end }}
    {{- with $config.rootCredentials.passwordKey }}
    passwordKey: {{ . | quote }}
    {{- end }}
  {{- with $config.leaseTTL }}
  leaseTTL: {{ . }}
  {{- end }}
  {{- with $config.leaseMaxTTL }}
  leaseMaxTTL: {{ . }}
  {{- end }}
  {{- with $config.passwordPolicy }}
  passwordPolicy: {{ . | quote }}
  {{- end }}
  {{- with $config.username }}
  username: {{ . | quote }}
  {{- end }}
  {{- with $config.usernameTemplate }}
  usernameTemplate: {{ . | quote }}
  {{- end }}
  {{- if hasKey $config "verifyConnection" }}
  verifyConnection: {{ $config.verifyConnection }}
  {{- end }}
{{- end }}
{{- end }}
