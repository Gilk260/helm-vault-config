{{- range $name, $config := .Values.pkiSecretEngineConfigs }}
{{- if $config }}
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: PKISecretEngineConfig
metadata:
  name: {{ include "vault-config.resourceName" (dict "context" $ "resourceName" $name "resourceType" "pkisecretengineconfig") }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "vault-config.labels" $ | nindent 4 }}
spec:
  authentication:
    path: {{ default "kubernetes" $config.authentication.path | quote }}
    role: {{ required (printf "pkiSecretEngineConfigs.%s.authentication.role is required" $name) $config.authentication.role | quote }}
    serviceAccount:
      name: {{ default "default" ($config.authentication.serviceAccount).name | quote }}
    {{- with $config.authentication.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  {{- with $config.connection }}
  connection:
    address: {{ .address | quote }}
    {{- with .maxRetries }}
    maxRetries: {{ . }}
    {{- end }}
    {{- with .timeOut }}
    timeOut: {{ . | quote }}
    {{- end }}
    {{- with .tLSConfig }}
    tLSConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  path: {{ required (printf "pkiSecretEngineConfigs.%s.path is required" $name) $config.path | quote }}
  commonName: {{ required (printf "pkiSecretEngineConfigs.%s.commonName is required" $name) $config.commonName | quote }}
  type: {{ default "root" $config.type | quote }}
  privateKeyType: {{ default "internal" $config.privateKeyType | quote }}
  format: {{ default "pem" $config.format | quote }}
  keyType: {{ default "rsa" $config.keyType | quote }}
  keyBits: {{ default 2048 $config.keyBits }}
  maxPathLength: {{ default -1 $config.maxPathLength }}
  certificateKey: {{ default "tls.crt" $config.certificateKey | quote }}
  {{- with $config.TTL }}
  TTL: {{ . | quote }}
  {{- end }}
  {{- with $config.CRLExpiry }}
  CRLExpiry: {{ . | quote }}
  {{- end }}
  {{- if hasKey $config "CRLDisable" }}
  CRLDisable: {{ $config.CRLDisable }}
  {{- end }}
  {{- with $config.CRLDistributionPoints }}
  CRLDistributionPoints:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.altNames }}
  altNames: {{ . | quote }}
  {{- end }}
  {{- with $config.IPSans }}
  IPSans: {{ . | quote }}
  {{- end }}
  {{- with $config.URISans }}
  URISans: {{ . | quote }}
  {{- end }}
  {{- with $config.otherSans }}
  otherSans: {{ . | quote }}
  {{- end }}
  {{- if hasKey $config "excludeCnFromSans" }}
  excludeCnFromSans: {{ $config.excludeCnFromSans }}
  {{- end }}
  {{- with $config.country }}
  country: {{ . | quote }}
  {{- end }}
  {{- with $config.province }}
  province: {{ . | quote }}
  {{- end }}
  {{- with $config.locality }}
  locality: {{ . | quote }}
  {{- end }}
  {{- with $config.organization }}
  organization: {{ . | quote }}
  {{- end }}
  {{- with $config.ou }}
  ou: {{ . | quote }}
  {{- end }}
  {{- with $config.streetAddress }}
  streetAddress: {{ . | quote }}
  {{- end }}
  {{- with $config.postalCode }}
  postalCode: {{ . | quote }}
  {{- end }}
  {{- with $config.serialNumber }}
  serialNumber: {{ . | quote }}
  {{- end }}
  {{- with $config.privateKeyFormat }}
  privateKeyFormat: {{ . | quote }}
  {{- end }}
  {{- with $config.issuingCertificates }}
  issuingCertificates:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.ocspServers }}
  ocspServers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.permittedDnsDomains }}
  permittedDnsDomains:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.internalSign }}
  internalSign:
    name: {{ .name | quote }}
  {{- end }}
  {{- with $config.externalSignSecret }}
  externalSignSecret:
    name: {{ .name | quote }}
  {{- end }}
{{- end }}
{{- end }}
