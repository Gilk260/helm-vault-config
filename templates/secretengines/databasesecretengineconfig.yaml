{{- range $name, $config := .Values.databaseSecretEngineConfigs }}
{{- if $config }}
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: DatabaseSecretEngineConfig
metadata:
  name: {{ include "vault-config.resourceName" (dict "context" $ "resourceName" $name "resourceType" "dbconfig") }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "vault-config.labels" $ | nindent 4 }}
spec:
  authentication:
    path: {{ default "kubernetes" $config.authentication.path | quote }}
    role: {{ required (printf "databaseSecretEngineConfigs.%s.authentication.role is required" $name) $config.authentication.role | quote }}
    serviceAccount:
      name: {{ default "default" ($config.authentication.serviceAccount).name | quote }}
    {{- with $config.authentication.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  {{- with $config.connection }}
  connection:
    address: {{ .address | quote }}
    {{- with .maxRetries }}
    maxRetries: {{ . }}
    {{- end }}
    {{- with .timeOut }}
    timeOut: {{ . | quote }}
    {{- end }}
    {{- with .tLSConfig }}
    tLSConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  path: {{ required (printf "databaseSecretEngineConfigs.%s.path is required" $name) $config.path | quote }}
  pluginName: {{ required (printf "databaseSecretEngineConfigs.%s.pluginName is required" $name) $config.pluginName | quote }}
  {{- with $config.pluginVersion }}
  pluginVersion: {{ . | quote }}
  {{- end }}
  connectionURL: {{ required (printf "databaseSecretEngineConfigs.%s.connectionURL is required" $name) $config.connectionURL | quote }}
  {{- with $config.allowedRoles }}
  allowedRoles:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.databaseSpecificConfig }}
  databaseSpecificConfig:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if hasKey $config "disableEscaping" }}
  disableEscaping: {{ $config.disableEscaping }}
  {{- end }}
  name: {{ default $name $config.name | quote }}
  {{- with $config.passwordAuthentication }}
  passwordAuthentication: {{ . | quote }}
  {{- end }}
  {{- with $config.passwordPolicy }}
  passwordPolicy: {{ . | quote }}
  {{- end }}
  rootCredentials:
    {{- if and $config.rootCredentials.secret $config.rootCredentials.vaultSecret }}
    {{- fail (printf "databaseSecretEngineConfigs.%s.rootCredentials: specify only one of secret, vaultSecret, or randomSecret" $name) }}
    {{- end }}
    {{- if and $config.rootCredentials.secret $config.rootCredentials.randomSecret }}
    {{- fail (printf "databaseSecretEngineConfigs.%s.rootCredentials: specify only one of secret, vaultSecret, or randomSecret" $name) }}
    {{- end }}
    {{- if and $config.rootCredentials.vaultSecret $config.rootCredentials.randomSecret }}
    {{- fail (printf "databaseSecretEngineConfigs.%s.rootCredentials: specify only one of secret, vaultSecret, or randomSecret" $name) }}
    {{- end }}
    {{- with $config.rootCredentials.passwordKey }}
    passwordKey: {{ . | quote }}
    {{- end }}
    {{- with $config.rootCredentials.usernameKey }}
    usernameKey: {{ . | quote }}
    {{- end }}
    {{- with $config.rootCredentials.secret }}
    secret:
      name: {{ .name | quote }}
    {{- end }}
    {{- with $config.rootCredentials.vaultSecret }}
    vaultSecret:
      path: {{ .path | quote }}
    {{- end }}
    {{- with $config.rootCredentials.randomSecret }}
    randomSecret:
      name: {{ .name | quote }}
    {{- end }}
  {{- with $config.rootPasswordRotation }}
  rootPasswordRotation:
    {{- if hasKey . "enable" }}
    enable: {{ .enable }}
    {{- end }}
    {{- with .rotationPeriod }}
    rotationPeriod: {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- with $config.rootRotationStatements }}
  rootRotationStatements:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.username }}
  username: {{ . | quote }}
  {{- end }}
  {{- if hasKey $config "verifyConnection" }}
  verifyConnection: {{ $config.verifyConnection }}
  {{- end }}
{{- end }}
{{- end }}
