{{- range $name, $config := .Values.pkiSecretEngineRoles }}
{{- if $config }}
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: PKISecretEngineRole
metadata:
  name: {{ include "vault-config.resourceName" (dict "context" $ "resourceName" $name "resourceType" "pkisecretenginerole") }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "vault-config.labels" $ | nindent 4 }}
spec:
  authentication:
    path: {{ default "kubernetes" $config.authentication.path | quote }}
    role: {{ required (printf "pkiSecretEngineRoles.%s.authentication.role is required" $name) $config.authentication.role | quote }}
    serviceAccount:
      name: {{ default "default" ($config.authentication.serviceAccount).name | quote }}
    {{- with $config.authentication.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  {{- with $config.connection }}
  connection:
    address: {{ .address | quote }}
    {{- with .maxRetries }}
    maxRetries: {{ . }}
    {{- end }}
    {{- with .timeOut }}
    timeOut: {{ . | quote }}
    {{- end }}
    {{- with .tLSConfig }}
    tLSConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  path: {{ required (printf "pkiSecretEngineRoles.%s.path is required" $name) $config.path | quote }}
  {{- with $config.name }}
  name: {{ . | quote }}
  {{- end }}
  TTL: {{ default "0s" $config.TTL | quote }}
  maxTTL: {{ default "0s" $config.maxTTL | quote }}
  keyType: {{ default "rsa" $config.keyType | quote }}
  keyBits: {{ default 2048 $config.keyBits }}
  {{- with $config.allowedDomains }}
  allowedDomains:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if hasKey $config "allowedDomainsTemplate" }}
  allowedDomainsTemplate: {{ $config.allowedDomainsTemplate }}
  {{- end }}
  {{- if hasKey $config "allowBareDomains" }}
  allowBareDomains: {{ $config.allowBareDomains }}
  {{- end }}
  {{- if hasKey $config "allowSubdomains" }}
  allowSubdomains: {{ $config.allowSubdomains }}
  {{- end }}
  {{- if hasKey $config "allowGlobDomains" }}
  allowGlobDomains: {{ $config.allowGlobDomains }}
  {{- end }}
  {{- if hasKey $config "allowAnyName" }}
  allowAnyName: {{ $config.allowAnyName }}
  {{- end }}
  {{- if hasKey $config "allowIPSans" }}
  allowIPSans: {{ $config.allowIPSans }}
  {{- end }}
  {{- if hasKey $config "allowLocalhost" }}
  allowLocalhost: {{ $config.allowLocalhost }}
  {{- end }}
  {{- with $config.allowedURISans }}
  allowedURISans:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.allowedOtherSans }}
  allowedOtherSans: {{ . | quote }}
  {{- end }}
  {{- if hasKey $config "enforceHostnames" }}
  enforceHostnames: {{ $config.enforceHostnames }}
  {{- end }}
  {{- if hasKey $config "serverFlag" }}
  serverFlag: {{ $config.serverFlag }}
  {{- end }}
  {{- if hasKey $config "clientFlag" }}
  clientFlag: {{ $config.clientFlag }}
  {{- end }}
  {{- if hasKey $config "codeSigningFlag" }}
  codeSigningFlag: {{ $config.codeSigningFlag }}
  {{- end }}
  {{- if hasKey $config "emailProtectionFlag" }}
  emailProtectionFlag: {{ $config.emailProtectionFlag }}
  {{- end }}
  {{- with $config.keyUsage }}
  keyUsage:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.extKeyUsage }}
  extKeyUsage:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $config.extKeyUsageOids }}
  extKeyUsageOids:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if hasKey $config "useCSRCommonName" }}
  useCSRCommonName: {{ $config.useCSRCommonName }}
  {{- end }}
  {{- if hasKey $config "useCSRSans" }}
  useCSRSans: {{ $config.useCSRSans }}
  {{- end }}
  {{- if hasKey $config "requireCn" }}
  requireCn: {{ $config.requireCn }}
  {{- end }}
  {{- if hasKey $config "basicConstraintsValidForNonCa" }}
  basicConstraintsValidForNonCa: {{ $config.basicConstraintsValidForNonCa }}
  {{- end }}
  {{- with $config.notBeforeDuration }}
  notBeforeDuration: {{ . | quote }}
  {{- end }}
  {{- if hasKey $config "generateLease" }}
  generateLease: {{ $config.generateLease }}
  {{- end }}
  {{- if hasKey $config "noStore" }}
  noStore: {{ $config.noStore }}
  {{- end }}
  {{- with $config.country }}
  country: {{ . | quote }}
  {{- end }}
  {{- with $config.province }}
  province: {{ . | quote }}
  {{- end }}
  {{- with $config.locality }}
  locality: {{ . | quote }}
  {{- end }}
  {{- with $config.organization }}
  organization: {{ . | quote }}
  {{- end }}
  {{- with $config.ou }}
  ou: {{ . | quote }}
  {{- end }}
  {{- with $config.streetAddress }}
  streetAddress: {{ . | quote }}
  {{- end }}
  {{- with $config.postalCode }}
  postalCode: {{ . | quote }}
  {{- end }}
  {{- with $config.serialNumber }}
  serialNumber: {{ . | quote }}
  {{- end }}
  {{- with $config.policyIdentifiers }}
  policyIdentifiers:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
