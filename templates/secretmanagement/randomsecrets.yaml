{{- range $name, $config := .Values.randomSecrets }}
{{- if $config }}
---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: RandomSecret
metadata:
  name: {{ include "vault-config.resourceName" (dict "context" $ "resourceName" $name "resourceType" "randomsecret") }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "vault-config.labels" $ | nindent 4 }}
spec:
  authentication:
    path: {{ default "kubernetes" $config.authentication.path | quote }}
    role: {{ required (printf "randomSecrets.%s.authentication.role is required" $name) $config.authentication.role | quote }}
    serviceAccount:
      name: {{ default "default" ($config.authentication.serviceAccount).name | quote }}
    {{- with $config.authentication.namespace }}
    namespace: {{ . | quote }}
    {{- end }}
  {{- with $config.connection }}
  connection:
    address: {{ .address | quote }}
    {{- with .maxRetries }}
    maxRetries: {{ . }}
    {{- end }}
    {{- with .timeOut }}
    timeOut: {{ . | quote }}
    {{- end }}
    {{- with .tLSConfig }}
    tLSConfig:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  path: {{ required (printf "randomSecrets.%s.path is required" $name) $config.path | quote }}
  secretKey: {{ required (printf "randomSecrets.%s.secretKey is required" $name) $config.secretKey | quote }}
  isKVSecretsEngineV2: {{ ternary $config.isKVSecretsEngineV2 true (hasKey $config "isKVSecretsEngineV2") }}
  kvSecretRetainPolicy: {{ default "Retain" $config.kvSecretRetainPolicy | quote }}
  name: {{ default $name $config.name | quote }}
  refreshPeriod: {{ default "1h" $config.refreshPeriod | quote }}
  secretFormat:
    {{- if and $config.secretFormat.passwordPolicyName $config.secretFormat.inlinePasswordPolicy }}
    {{- fail (printf "randomSecrets.%s.secretFormat: specify exactly one of passwordPolicyName or inlinePasswordPolicy" $name) }}
    {{- else if $config.secretFormat.passwordPolicyName }}
    passwordPolicyName: {{ $config.secretFormat.passwordPolicyName | quote }}
    {{- else if $config.secretFormat.inlinePasswordPolicy }}
    inlinePasswordPolicy: |
{{ $config.secretFormat.inlinePasswordPolicy | indent 6 }}
    {{- else }}
    {{- fail (printf "randomSecrets.%s.secretFormat: one of passwordPolicyName or inlinePasswordPolicy is required" $name) }}
    {{- end }}
{{- end }}
{{- end }}
