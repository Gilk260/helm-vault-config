---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yaml]

  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.30
    hooks:
      - id: helmlint

  - repo: https://github.com/stackrox/kube-linter
    rev: v0.8.3
    hooks:
      - id: kube-linter
        args: [--config, .kube-linter.yaml]

  - repo: local
    hooks:
      - id: kubeconform
        name: Validate rendered templates (kubeconform)
        language: system
        entry: sh -c 'helm template test-release . | kubeconform -kubernetes-version 1.31.0 -ignore-missing-schemas -summary -output text'
        files: '(templates/|values.*\.yaml|Chart\.yaml)'
        pass_filenames: false

  - repo: local
    hooks:
      - id: helm-unittest
        name: Run helm unit tests
        language: system
        entry: sh -c 'helm unittest -f "tests/**/*_test.yaml" .'
        files: '(templates/|tests/|values.*\.yaml|Chart\.yaml)'
        pass_filenames: false

  - repo: https://github.com/norwoodj/helm-docs
    rev: v1.14.2
    hooks:
      - id: helm-docs
        args:
          - --chart-search-root=.
          - --skip-version-footer
